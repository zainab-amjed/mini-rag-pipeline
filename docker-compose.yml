services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
    environment:
      SCRAPE_URL: ${SCRAPE_URL:-https://www.kubeflow.org/docs/}
      MAX_PAGES: ${MAX_PAGES:-50}
    command: >
      python -m pipeline.run_pipeline
      --url ${SCRAPE_URL:-https://www.kubeflow.org/docs/}
      --max-pages ${MAX_PAGES:-50}

  api:
    build:
      context: .
      dockerfile: Dockerfile.serve
    volumes:
      - ./data:/app/data
    depends_on:
      pipeline:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
